<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#07111f" />
      <stop offset="55%" stop-color="#030712" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="45%" stop-color="#93c5fd" />
      <stop offset="70%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#fb7185" />
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bg)" />

  <g
    fill="#dbeafe"
    font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
    font-size="4"
    opacity="0.55"
    text-anchor="middle"
  >
    <text x="10" y="13">.</text>
    <text x="49" y="11">.</text>
    <text x="55" y="19">:</text>
    <text x="13" y="54">.</text>
    <text x="51" y="52">*</text>
  </g>

  <ellipse
    cx="32"
    cy="32"
    rx="21"
    ry="11.5"
    fill="none"
    stroke="url(#ring)"
    stroke-opacity="0.18"
    stroke-width="2.2"
  />

  <g
    font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
    font-weight="700"
    text-anchor="middle"
  >
    <text x="17" y="30" fill="#93c5fd" font-size="8">:</text>
    <text x="22" y="24" fill="#7dd3fc" font-size="9">*</text>
    <text x="31" y="21" fill="#dbeafe" font-size="8">+</text>
    <text x="40" y="23" fill="#fdba74" font-size="9">#</text>
    <text x="47" y="29" fill="#fb7185" font-size="10">@</text>
    <text x="44" y="39" fill="#fdba74" font-size="9">%</text>
    <text x="34" y="43" fill="#fde68a" font-size="8">*</text>
    <text x="24" y="42" fill="#93c5fd" font-size="8">:</text>
    <text x="17" y="37" fill="#60a5fa" font-size="9">~</text>
  </g>

  <ellipse
    cx="32"
    cy="32"
    rx="16"
    ry="8.5"
